{% extends "base.html" %}

{% block head %}
<link rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}

<div class="auth-page">

    <div class="card">

        <h1>Create Account</h1>

        <p class="subtitle">
            Join the Typing Platform today.
        </p>

        <form method="POST">

            <input
                type="text"
                name="full_name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

        <p>

            Already have an account?

            <a href="/">
                Login
            </a>

        </p>

    </div>

</div>

{% endblock %}
