{% extends "base.html" %}

{% block head %}
<link rel="stylesheet"
      href="{{ url_for('static', filename='css/achievements.css') }}">
{% endblock %}

{% block content %}

<div class="achievements-page">

    <div class="achievements-header">

        <h1>Achievements</h1>

        <p>
            Track your milestones and unlock new badges.
        </p>

    </div>

    <div class="achievements-grid">

        {% for item in achievements %}

        <div class="achievement-card">

            <div class="badge">

                {{ item.badge }}

            </div>

            <h3>

                {{ item.achievement_name }}

            </h3>

            <p class="unlock-date">

                Unlocked on {{ item.unlocked_at[:10] }}

            </p>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
