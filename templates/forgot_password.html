{% extends "base.html" %}

{% block head %}
<link rel="stylesheet"
      href="{{ url_for('static', filename='css/forgot_password.css') }}">
{% endblock %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">

        <h1>Forgot Password</h1>

        <p>
            Enter your email address and we'll send you a password reset link.
        </p>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email Address"
                required
            >

            <button type="submit">
                Send Reset Link
            </button>

        </form>

        <div class="auth-links">

            <a href="/">
                Back to Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
