{% extends "base.html" %}

{% block head %}
<link rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}

<div class="auth-page">

    <div class="card">

        <h1>Login</h1>

        <p class="subtitle">
            Welcome back! Sign in to continue.
        </p>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="/register">Register</a>
        </p>

        <p>
            <a href="/forgot-password">
                Forgot Password?
            </a>
        </p>

    </div>

</div>

{% endblock %}
